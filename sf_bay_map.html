<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Bay Area Map</title>
<link rel="stylesheet" href="https://use.typekit.net/gek7uke.css">
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "indivisible", sans-serif; background: #f5f5f3; }
  #map-wrapper { position: relative; width: 100%; height: 100vh; }
  #map { width: 100%; height: 100%; }

  .mapboxgl-popup-content {
    border-radius: 10px !important;
    padding: 14px 18px !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
    font-family: "indivisible", sans-serif;
  }
  .popup-title { font-weight: 600; font-size: 0.95rem; color: #111; margin-bottom: 3px; }
  .popup-desc { font-size: 0.82rem; color: #666; }

  #color-control {
    position: absolute; top: 16px; left: 16px;
    background: white; border-radius: 8px; padding: 10px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12); z-index: 10;
    display: flex; flex-direction: column; gap: 4px;
  }
  #color-control label { font-size: 0.8rem; color: #555; }
  #color-control input {
    width: 90px; padding: 4px 8px; border: 1px solid #e0e0e0;
    border-radius: 4px; font-size: 0.82rem; font-family: "indivisible", sans-serif; outline: none;
  }
  #color-control input:focus { border-color: #aaa; }

</style>
</head>
<body>
<div id="map-wrapper">
  <div id="map"></div>
  <div id="color-control">
    <label>Land color</label>
    <input type="text" id="hex-input" value="#916D00" maxlength="7" />
    <label>Water color</label>
    <input type="text" id="hex-water" value="#BCCCEB" maxlength="7" />
    <label>Road color</label>
    <input type="text" id="hex-road" value="#C1AE62" maxlength="7" />
    <label>Dot color</label>
    <input type="text" id="hex-dot" value="#FBB116" maxlength="7" />
    <label>Dot size</label>
    <input type="number" id="dot-size" value="4" min="1" step="1" />
    <label>Dot stroke</label>
    <input type="text" id="hex-dot-stroke" placeholder="none" maxlength="7" />
    <label>Land pattern color</label>
    <input type="text" id="hex-land-pattern" value="#916D00" maxlength="7" />
    <label>Water pattern color</label>
    <input type="text" id="hex-water-pattern" value="#BCCCEB" maxlength="7" />
    <label>Land pattern</label>
    <input type="file" id="upload-land-pattern" accept="image/png,image/jpeg" />
    <label>Water pattern</label>
    <input type="file" id="upload-water-pattern" accept="image/png,image/jpeg" />
    <label>Pattern scale</label>
    <input type="number" id="pixel-ratio" value="88" min="1" step="1" />
    <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
      <input type="checkbox" id="toggle-roads" checked /> Show roads
    </label>
    <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
      <input type="checkbox" id="toggle-land-pattern" checked /> Show land pattern
    </label>
    <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
      <input type="checkbox" id="toggle-labels" checked /> Show labels
    </label>
    <label>Building color</label>
    <input type="text" id="hex-building" value="#C1AE62" maxlength="7" />
    <label>Label color</label>
    <input type="text" id="hex-label" value="#333333" maxlength="7" />
    <label>Label halo</label>
    <input type="text" id="hex-label-halo" value="rgba(255,255,255,0.3)" maxlength="30" />
  </div>
</div>

<script>
const TOKEN = 'pk.eyJ1Ijoicm1jZWxoZW55IiwiYSI6ImNrZDRpenltczExMjcycW11Z3AzaHE3cmsifQ.r4jOEJ5o1M3P1jSzu1GniA';
let map;
let landImg, waterImg;

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function loadCSS(href) {
  const l = document.createElement('link');
  l.rel = 'stylesheet'; l.href = href;
  document.head.appendChild(l);
}

async function init() {
  loadCSS('https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css');
  await loadScript('https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js');

  mapboxgl.accessToken = TOKEN;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [-122.2, 37.65],
    zoom: 8.8,
    minZoom: 7,
    maxZoom: 16,
  });

  map.addControl(new mapboxgl.NavigationControl(), 'bottom-left');

  map.on('load', async () => {
    await new Promise((resolve, reject) => {
      map.loadImage('Pattern_water.png', (err, img) => {
        if (err) { reject(err); return; }
        waterImg = img;
        map.addImage('pattern-water', img, { pixelRatio: 88 });

        const styleLayers = map.getStyle().layers;
        const waterIndex = styleLayers.findIndex(l => l.id === 'water');
        const waterLayer = styleLayers[waterIndex];
        const afterWaterId = styleLayers[waterIndex + 1]?.id;

        map.addLayer({
          id: 'water-pattern',
          type: 'fill',
          source: waterLayer.source,
          'source-layer': waterLayer['source-layer'],
          paint: { 'fill-pattern': 'pattern-water' }
        }, afterWaterId);

        resolve();
      });
    });

    await new Promise((resolve, reject) => {
      map.loadImage('Pattern_land.png', (err, img) => {
        if (err) { reject(err); return; }
        landImg = img;
        map.addImage('pattern-land', img, { pixelRatio: 88 });

        map.addSource('country-boundaries', {
          type: 'vector',
          url: 'mapbox://mapbox.country-boundaries-v1'
        });

        const styleLayers = map.getStyle().layers;
        const firstRoadLayer = styleLayers.find(l =>
          l.id.startsWith('tunnel') || l.id.startsWith('road') || l.id.startsWith('bridge')
        );

        map.addLayer({
          id: 'country-fill',
          type: 'fill',
          source: 'country-boundaries',
          'source-layer': 'country_boundaries',
          paint: { 'fill-color': '#916D00' }
        }, firstRoadLayer?.id);

        map.addLayer({
          id: 'country-pattern',
          type: 'fill',
          source: 'country-boundaries',
          'source-layer': 'country_boundaries',
          paint: { 'fill-pattern': 'pattern-land' }
        }, firstRoadLayer?.id);

        resolve();
      });
    });

    ['national-park', 'landuse', 'land-structure-polygon'].forEach(id => {
      map.setLayoutProperty(id, 'visibility', 'none');
    });

    applyLandColor('#916D00');
    applyLabelStyle({ color: '#333333', halo: 'rgba(255,255,255,0.3)' });
    map.getStyle().layers.forEach(l => {
      if (l.type === 'symbol' && l.layout?.['text-field']) {
        try { map.setLayoutProperty(l.id, 'text-font', ['Arial Unicode MS Regular']); } catch(e) {}
      }
    });
    map.setPaintProperty('water', 'fill-color', '#BCCCEB');
    map.getStyle().layers.forEach(l => {
      if (l.type === 'line') {
        try { map.setPaintProperty(l.id, 'line-color', '#C1AE62'); } catch(e) {}
      }
    });

    const venuesRes = await fetch('venues.geojson');
    const venuesData = await venuesRes.json();

    map.addSource('venues', {
      type: 'geojson',
      data: venuesData
    });

    map.addLayer({
      id: 'venues',
      type: 'circle',
      source: 'venues',
      paint: { 'circle-radius': 4, 'circle-color': '#FBB116' }
    });

    // Census cartographic boundary (500k, coastline-clipped) for CA counties
    const cbRes = await fetch('https://www2.census.gov/geo/tiger/GENZ2022/json/cb_2022_06_county_500k.json');
    const cbData = await cbRes.json();
    const targetFIPS = ['06041', '06097', '06055', '06075'];
    const features = cbData.features.filter(f => targetFIPS.includes(f.properties.GEOID));
    map.addSource('counties', { type: 'geojson', data: { type: 'FeatureCollection', features } });
    map.addLayer({
      id: 'county-boundaries',
      type: 'line',
      source: 'counties',
      paint: { 'line-color': '#000000', 'line-width': 1.5 }
    });
  });
}

function applyLabelStyle({ color, halo } = {}) {
  map.getStyle().layers.forEach(l => {
    if (l.type === 'symbol' && l.layout?.['text-field']) {
      try {
        if (color !== undefined) map.setPaintProperty(l.id, 'text-color', color);
        if (halo !== undefined) {
          map.setPaintProperty(l.id, 'text-halo-color', halo);
          map.setPaintProperty(l.id, 'text-halo-width', 1.5);
        }
      } catch(e) {}
    }
  });
}

function tintImage(img, hex) {
  const canvas = document.createElement('canvas');
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  ctx.globalCompositeOperation = 'multiply';
  ctx.fillStyle = hex;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.globalCompositeOperation = 'destination-in';
  ctx.drawImage(img, 0, 0);
  return ctx.getImageData(0, 0, canvas.width, canvas.height);
}

function applyLandPatternColor(hex) {
  if (!landImg) return;
  const ratio = parseFloat(document.getElementById('pixel-ratio').value) || 88;
  if (map.hasImage('pattern-land')) map.removeImage('pattern-land');
  map.addImage('pattern-land', tintImage(landImg, hex), { pixelRatio: ratio, width: landImg.width, height: landImg.height });
}

function applyWaterPatternColor(hex) {
  if (!waterImg) return;
  const ratio = parseFloat(document.getElementById('pixel-ratio').value) || 88;
  if (map.hasImage('pattern-water')) map.removeImage('pattern-water');
  map.addImage('pattern-water', tintImage(waterImg, hex), { pixelRatio: ratio, width: waterImg.width, height: waterImg.height });
}

function applyLandColor(hex) {
  try {
    map.setPaintProperty('country-fill', 'fill-color', hex);
  } catch(e) {}
}

document.getElementById('hex-input').addEventListener('input', e => {
  const hex = e.target.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) applyLandColor(hex);
});

function applyUploadedPattern(file, imageKey) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    const ratio = parseFloat(document.getElementById('pixel-ratio').value) || 88;
    if (imageKey === 'pattern-land') landImg = img;
    if (imageKey === 'pattern-water') waterImg = img;
    if (map.hasImage(imageKey)) map.removeImage(imageKey);
    map.addImage(imageKey, img, { pixelRatio: ratio });
  };
  img.src = url;
}

document.getElementById('upload-land-pattern').addEventListener('change', e => {
  if (e.target.files[0]) applyUploadedPattern(e.target.files[0], 'pattern-land');
});

document.getElementById('upload-water-pattern').addEventListener('change', e => {
  if (e.target.files[0]) applyUploadedPattern(e.target.files[0], 'pattern-water');
});

document.getElementById('hex-land-pattern').addEventListener('input', e => {
  const hex = e.target.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) applyLandPatternColor(hex);
});

document.getElementById('hex-water-pattern').addEventListener('input', e => {
  const hex = e.target.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) applyWaterPatternColor(hex);
});

document.getElementById('pixel-ratio').addEventListener('input', e => {
  const ratio = parseFloat(e.target.value);
  if (!ratio || ratio < 1) return;
  if (map.hasImage('pattern-land')) map.removeImage('pattern-land');
  if (map.hasImage('pattern-water')) map.removeImage('pattern-water');
  if (landImg) map.addImage('pattern-land', landImg, { pixelRatio: ratio });
  if (waterImg) map.addImage('pattern-water', waterImg, { pixelRatio: ratio });
});

document.getElementById('toggle-roads').addEventListener('change', e => {
  const visibility = e.target.checked ? 'visible' : 'none';
  map.getStyle().layers.forEach(l => {
    if (l.type === 'line' && l.id !== 'county-boundaries') {
      map.setLayoutProperty(l.id, 'visibility', visibility);
    }
  });
});

document.getElementById('toggle-land-pattern').addEventListener('change', e => {
  map.setLayoutProperty('country-pattern', 'visibility', e.target.checked ? 'visible' : 'none');
});

document.getElementById('toggle-labels').addEventListener('change', e => {
  const visibility = e.target.checked ? 'visible' : 'none';
  map.getStyle().layers.forEach(l => {
    if (l.type === 'symbol' && l.layout?.['text-field']) {
      map.setLayoutProperty(l.id, 'visibility', visibility);
    }
  });
});

document.getElementById('dot-size').addEventListener('input', e => {
  const size = parseFloat(e.target.value);
  if (size > 0) map.setPaintProperty('venues', 'circle-radius', size);
});

document.getElementById('hex-dot-stroke').addEventListener('input', e => {
  const hex = e.target.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
    map.setPaintProperty('venues', 'circle-stroke-width', 1);
    map.setPaintProperty('venues', 'circle-stroke-color', hex);
  }
});

document.getElementById('hex-dot').addEventListener('input', e => {
  const hex = e.target.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
    try { map.setPaintProperty('venues', 'circle-color', hex); } catch(e) {}
  }
});

document.getElementById('hex-road').addEventListener('input', e => {
  const hex = e.target.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
    map.getStyle().layers.forEach(l => {
      if (l.type === 'line') {
        try { map.setPaintProperty(l.id, 'line-color', hex); } catch(e) {}
      }
    });
  }
});

document.getElementById('hex-water').addEventListener('input', e => {
  const hex = e.target.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
    try { map.setPaintProperty('water', 'fill-color', hex); } catch(e) {}
  }
});

document.getElementById('hex-building').addEventListener('input', e => {
  const hex = e.target.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
    map.getStyle().layers.forEach(l => {
      if (l.id.includes('building')) {
        try { map.setPaintProperty(l.id, l.type === 'fill-extrusion' ? 'fill-extrusion-color' : 'fill-color', hex); } catch(e) {}
      }
    });
  }
});

document.getElementById('hex-label').addEventListener('input', e => {
  const hex = e.target.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) applyLabelStyle({ color: hex });
});

document.getElementById('hex-label-halo').addEventListener('input', e => {
  const val = e.target.value.trim();
  const isHex = /^#[0-9a-fA-F]{6}$/.test(val);
  const isRgba = /^rgba\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*(0|1|0?\.\d+)\s*\)$/.test(val);
  if (isHex || isRgba) applyLabelStyle({ halo: val });
});

init();
</script>
</body>
</html>
