<link rel="stylesheet" href="https://use.typekit.net/gek7uke.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "indivisible", sans-serif; background: #f5f5f3; }
  #map-wrapper { position: relative; width: 100%; height: 100vh; }
  #map { width: 100%; height: 100%; }

  .mapboxgl-popup-content {
    border-radius: 10px !important;
    padding: 14px 18px !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
    font-family: "indivisible", sans-serif;
  }
  .popup-title { font-weight: 600; font-size: 0.95rem; color: #111; margin-bottom: 3px; }
  .popup-desc { font-size: 0.82rem; color: #666; }

</style>
</head>
<body>
<div id="map-wrapper">
  <div id="map"></div>
</div>

<script>
const TOKEN = 'pk.eyJ1Ijoicm1jZWxoZW55IiwiYSI6ImNrZDRpenltczExMjcycW11Z3AzaHE3cmsifQ.r4jOEJ5o1M3P1jSzu1GniA';
let map;

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function loadCSS(href) {
  const l = document.createElement('link');
  l.rel = 'stylesheet'; l.href = href;
  document.head.appendChild(l);
}

async function init() {
  loadCSS('https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css');
  await loadScript('https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js');

  mapboxgl.accessToken = TOKEN;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [-122.2, 37.65],
    zoom: 8.8,
    minZoom: 7,
    maxZoom: 16,

  map.addControl(new mapboxgl.NavigationControl(), 'bottom-left');

    { name: 'EPACENTER', address: '1950 Bay Rd, East Palo Alto, CA 94303' },
    { name: 'SFO Museum', address: 'San Francisco International Airport, San Francisco, CA 94128' },
  ];

  map.on('load', async () => {
    const results = await Promise.all(venues.map(async v => {
      try {
        const res = await fetch(
          `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(v.address)}.json?access_token=${TOKEN}&limit=1`
        );
        const data = await res.json();
        if (data.features && data.features.length > 0) {
          return { type: 'Feature', geometry: data.features[0].geometry, properties: { name: v.name } };
        }
      } catch(e) {}
      return null;
    }));

    map.addSource('venues', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: results.filter(Boolean) }
    });

    map.addLayer({
      id: 'venues',
      type: 'circle',
      source: 'venues',
      paint: { 'circle-radius': 4, 'circle-color': '#000000' }
    });
  });
}

init();
</script>
</body>
</html>
